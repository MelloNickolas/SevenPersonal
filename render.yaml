# Blueprint do backend (.NET API) no Render.
# Importe este repositório em https://dashboard.render.com → New → Blueprint.
# Banco: Postgres no Neon (externo) — não precisa de disco no Render.
services:
  - type: web
    name: seven-personal-api
    runtime: docker
    plan: free
    region: oregon
    dockerContext: ./backend
    dockerfilePath: ./backend/SevenPersonal.API/Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JWT_SECRET
        generateValue: true
      # Defina os valores abaixo no painel do Render (não versionados):
      - key: DATABASE_URL             # URL postgresql:// do Neon
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_FOLDER
        value: seven-personal
      - key: CORS_ORIGIN
        sync: false
